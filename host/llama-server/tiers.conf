# ============================================================================
# tiers.conf — THE single tier-identity table (issue #016).
# ============================================================================
# One file defines tier → { port, opencode config json, launchd label,
# log tag } (+ alias / corrected template / derived log path). Sibling of
# models.conf, which remains the per-tier MODEL table (GGUF/CTX/sampler).
# Identity lives HERE, not in models.conf, because the JS side line-parses
# this file: models.conf carries $HOME expansions and history prose; this
# file is a strict literal KEY=VALUE contract both bash and JS read.
#
# CONSUMERS (each resolves through tier_resolve(); none keeps a private
# case table — drift is what caused the tier-32 log-path bug):
#   host/llama-server/scripts/opencode-server          (launcher)
#   host/llama-server/scripts/validate-tool-calls.sh   (default BASE)
#   host/llama-server/scripts/rotate-opencode-server-log.sh (default log)
#   client/opencode/bin/oc                             (user CLI)
#   host/test/run-config-ab.sh                         (sweep driver)
#   wizard/steps/51-opencode-server.sh, 52-opencode-client.sh,
#     61-opencode-smoke.sh, wizard doctor               (wizard)
#   host/test/lib/config.js parseTiersConf()           (JS; verbatim line
#     parse) → lib/opencode_server_timings.js defaultServerLogPath()
#   host/llama-server/scripts/check-tier-table.sh      (cross-consumer
#     assertion — run it after ANY edit to this file)
#
# FORMAT CONTRACT (the JS parser reads assignments verbatim — keep it):
#   - one KEY=VALUE assignment per line, starting in column 1;
#   - VALUE is a LITERAL: no $VAR, no $(...), no trailing comment on the
#     line; an optional matching pair of double quotes is stripped;
#   - LAUNCHD_LABEL "-" means "no launchd path BY DESIGN" (on-demand only);
#   - LOG_TAG is the suffix spliced into log/pidfile basenames:
#     ${OPENCODE_LOG_BASE}${LOG_TAG}.log / .pid;
#   - bash 3.2 sourceable; safe under set -u / set -e / set -o pipefail.
#
# Adding a tier or moving a port = edit THIS file, plus ship the rendered
# artifacts it names (client/opencode/<OPENCODE_CONFIG>, launchd/<LABEL>.plist
# — templates/outputs, allowed to repeat the literals) and the model row in
# models.conf. Then run scripts/check-tier-table.sh: it asserts every bash
# consumer, the rendered configs, and the JS fallback snapshot
# (lib/config.js FALLBACK_TIER_TABLE — update it in the same change) agree.

TIERS_ALL="64 16 32"
TIER_DEFAULT=64
OPENCODE_LOG_BASE="/tmp/opencode-llama-server"

# 64 GB — RESIDENT launchd daemon (the daily serving daemon, decision §2.5).
TIER_64_PORT=11436
TIER_64_OPENCODE_CONFIG="opencode.json"
TIER_64_LAUNCHD_LABEL="com.mac-llm-lab.opencode-server"
TIER_64_LOG_TAG=""
TIER_64_ALIAS="opencode"
TIER_64_TEMPLATE="qwen36-corrected.jinja"

# 16 GB — launchd plist available; oc lifecycles it on-demand (decision §2.5).
TIER_16_PORT=11437
TIER_16_OPENCODE_CONFIG="opencode.16.json"
TIER_16_LAUNCHD_LABEL="com.mac-llm-lab.opencode-server-16"
TIER_16_LOG_TAG="-16"
TIER_16_ALIAS="opencode-16"
TIER_16_TEMPLATE="qwen35-corrected.jinja"

# 32 GB — on-demand only BY DESIGN (decision §2.5): no launchd label/plist.
TIER_32_PORT=11438
TIER_32_OPENCODE_CONFIG="opencode.32.json"
TIER_32_LAUNCHD_LABEL="-"
TIER_32_LOG_TAG="-32"
TIER_32_ALIAS="opencode-32"
TIER_32_TEMPLATE="qwen35-corrected.jinja"

# tier_resolve TIER — validate TIER against TIERS_ALL, then flatten its row
# into the caller's shell:
#   TIER_PORT  TIER_OPENCODE_CONFIG  TIER_LAUNCHD_LABEL ("-" = none)
#   TIER_LOG_TAG  TIER_ALIAS  TIER_TEMPLATE
#   TIER_LOG_PATH  ( = ${OPENCODE_LOG_BASE}${TIER_LOG_TAG}.log )
# Returns 1 on an unknown tier (callers attach their own die/err message).
# bash 3.2: no associative arrays, so eval indirection — gated by the
# TIERS_ALL membership check above it, so $1 is never eval'd unvalidated.
# (The JS parser ignores this function: only column-1 KEY=VALUE lines parse.)
tier_resolve() {
  case " $TIERS_ALL " in
    *" $1 "*) : ;;
    *) return 1 ;;
  esac
  eval "TIER_PORT=\"\${TIER_$1_PORT}\""
  eval "TIER_OPENCODE_CONFIG=\"\${TIER_$1_OPENCODE_CONFIG}\""
  eval "TIER_LAUNCHD_LABEL=\"\${TIER_$1_LAUNCHD_LABEL}\""
  eval "TIER_LOG_TAG=\"\${TIER_$1_LOG_TAG}\""
  eval "TIER_ALIAS=\"\${TIER_$1_ALIAS}\""
  eval "TIER_TEMPLATE=\"\${TIER_$1_TEMPLATE}\""
  TIER_LOG_PATH="${OPENCODE_LOG_BASE}${TIER_LOG_TAG}.log"
}
