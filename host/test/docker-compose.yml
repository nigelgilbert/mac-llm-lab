# Ephemeral test containers. Always invoked via `docker compose run --rm ...`
# or `docker compose build ...`, never `up -d`.

services:
  # Baked eval-runner image for run-config-ab.sh's arm sub-phases (issue #009):
  # node + git + docker CLI + compose preinstalled, replacing the per-sweep
  # `apk add` on stock docker:cli. BUILD-ONLY service — never `run`/`up`'d via
  # compose (run-config-ab.sh launches it with plain `docker run` so the mount
  # contract stays explicit there). Build: `docker compose build runner`.
  # The `build` profile keeps it out of default `up`/`run` resolution.
  runner:
    profiles: ["build"]
    build:
      context: .
      dockerfile: Dockerfile.runner
    image: mac-llm-lab-eval-runner:local
    command: ["true"]

  # Plain node toolchain (no docker CLI): unit tests + analysis scripts.
  # Default command (Dockerfile CMD) runs __tests__/lib + __tests__/scripts.
  test:
    build:
      context: .
    image: mac-llm-lab-test:local
    working_dir: /test
    environment:
      - TIER=${TIER:-64}
    volumes:
      # Per-run sidecar artifacts + sweep registries. Static mount; per-run
      # subdirectories are created by the runner under <run-id>/. The registry
      # default path (lib/registry.js) resolves under this mount.
      - ./.claw-runtime:/workspace/.claw-runtime
