services:
  tester:
    build: .
    image: wizard-tester:local
    network_mode: bridge
    environment:
      - HOST_GATEWAY=${HOST_GATEWAY:-host.docker.internal}
      - MODE=${MODE:-docker}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  harness:
    build:
      context: .
      dockerfile: Dockerfile.harness
    image: wizard-harness:local
    volumes:
      - ../..:/repo:ro
    environment:
      - HARNESS_FILTER=${HARNESS_FILTER:-}
      - NO_COLOR=${NO_COLOR:-}
